# Vex e2e test fixture — TEST ONLY, never used in production.
#
# Hardcoded credentials + port 5777 retained for parity with the
# existing engine test suite (decision 2026-05-08: keep 5777 in test
# fixtures, 55432 in production). Tmpfs storage so containers can be
# torn down between runs without touching the host filesystem.

name: vex-e2e

services:
  db:
    image: pgvector/pgvector:0.8.2-pg18-trixie@sha256:058fdb396f7b11f66cb7084db6c970846f8cb3a36b101b2714bea6727d530322
    restart: "no"
    environment:
      POSTGRES_DB: vex_test_e2e
      POSTGRES_USER: vex
      POSTGRES_PASSWORD: ${VEX_E2E_DB_PASSWORD:-vex_e2e_test_password}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    # Postgres 18+ uses `/var/lib/postgresql/<version>/` for the data
    # directory (docker-library/postgres#1259). Mount one level up.
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vex -d vex_test_e2e"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    ports:
      - target: 5432
        published: "5777"
        host_ip: 127.0.0.1
        protocol: tcp
        mode: host
