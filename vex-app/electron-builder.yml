appId: com.vex.app
productName: Vex
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# Internal unsigned dev/test packaging only. Public production releases must use
# a separate signed release profile with forceCodeSigning: true, macOS
# notarization, Windows signature verification, checksums, and updater metadata.
forceCodeSigning: false

asar: true
electronUpdaterCompatibility: ">=2.16"
afterPack: ./build/afterPack.mjs

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**
  - package.json
  # Exclude sourcemaps from packaged artifacts (security + size).
  - "!dist/**/*.map"
  - "!dist/**/*.tsbuildinfo"

extraResources:
  - from: resources/compose
    to: compose
    filter: ["**/*"]
  - from: resources/migrations
    to: migrations
    filter: ["**/*.sql"]

mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # Dev/test only. Production release config must set this to true.
  notarize: false

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  # Dev/test only. Production release config must set this to true.
  verifyUpdateCodeSignature: false

linux:
  category: Finance
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
