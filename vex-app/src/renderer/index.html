<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Remote images are DISABLED for launch: img-src is pinned to `'self' data:`
      (no `https:`) to close the CSP img-src exfiltration channel — a hostile /
      prompt-injected model could otherwise emit a markdown <img> whose URL
      carries a wallet address/portfolio to an attacker host via a GET that
      connect-src 'self' does NOT stop. Token logos fall back to alt text; remote
      logos return post-launch via a tool-sourced-URL allowlist. script-src /
      connect-src stay strict 'self', and the build gate
      (scripts/check-build-artifacts.mjs) asserts img-src stays exactly
      `'self' data:`.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
    />
    <title>Vex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
