name: Publish to npm

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Check if version already published
        id: version-check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          if npm view "@vex/vex@${LOCAL_VERSION}" version 2>/dev/null; then
            echo "Version ${LOCAL_VERSION} already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${LOCAL_VERSION} not yet published — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # GHCR image validation is intentionally disabled for the current npm CLI release.
      # Update this step later when vex-agent image publishing is reintroduced.
      #
      # - name: Verify matching GHCR agent image exists
      #   if: steps.version-check.outputs.skip != 'true'
      #   env:
      #     AGENT_IMAGE_REPOSITORY: vex-foundation/vex/vex-agent
      #   run: |
      #     set -euo pipefail
      #
      #     LOCAL_VERSION=$(node -p "require('./package.json').version")
      #     TOKEN_RESPONSE=$(curl -sSL "https://ghcr.io/token?service=ghcr.io&scope=repository:${AGENT_IMAGE_REPOSITORY}:pull")
      #     TOKEN=$(printf '%s' "$TOKEN_RESPONSE" | node -e "const fs=require('node:fs'); try { const data=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(typeof data.token === 'string' ? data.token : ''); } catch {}")
      #
      #     if [ -z "$TOKEN" ]; then
      #       echo "::error::Public GHCR pull token unavailable for ghcr.io/${AGENT_IMAGE_REPOSITORY}. Publish the image and make the package public before npm publish."
      #       printf '%s\n' "$TOKEN_RESPONSE"
      #       exit 1
      #     fi
      #
      #     HTTP_STATUS=$(curl -sSL -o /tmp/vex-agent-manifest.json -w "%{http_code}" \
      #       -H "Authorization: Bearer ${TOKEN}" \
      #       -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json" \
      #       "https://ghcr.io/v2/${AGENT_IMAGE_REPOSITORY}/manifests/${LOCAL_VERSION}")
      #
      #     if [ "$HTTP_STATUS" != "200" ]; then
      #       echo "::error::Missing or non-public GHCR image ghcr.io/${AGENT_IMAGE_REPOSITORY}:${LOCAL_VERSION}. Publish the image first, then rerun npm publish."
      #       cat /tmp/vex-agent-manifest.json || true
      #       exit 1
      #     fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip != 'true'
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: steps.version-check.outputs.skip != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.version-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --target production \
            --title "v${VERSION} — Vex" \
            --generate-notes \
            --latest
