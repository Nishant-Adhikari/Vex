name: Publish Echo Agent Image

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: false # DISABLED for the current CLI-only release; update later for echo-agent / VEX image publishing
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/echo-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/echoclaw-labs/echoclaw/echo-agent:${{ steps.meta.outputs.version }}
            ghcr.io/echoclaw-labs/echoclaw/echo-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
