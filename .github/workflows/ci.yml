name: CI

on:
  push:
    branches: [main, stage, production]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  vex-app-build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vex-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Install root dependencies (monorepo — @vex-lib alias bundles root MCP code into vex-app's main process, rolldown resolves third-party deps relative to the root file location, so root node_modules MUST exist at build time)
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Install vex-app dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and typecheck
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  vex-app-e2e:
    # Required gate from day 1 — boot smoke against the built Electron
    # bundle. If this flakes we treat that as a real bug, not as a
    # soft check (no continue-on-error). `needs:` here gates START
    # ordering only; this job runs in a fresh runner and rebuilds the
    # bundle + reinstalls node_modules from scratch (per-job filesystem
    # isolation in GitHub Actions).
    runs-on: ubuntu-latest
    needs: vex-app-build-and-test
    defaults:
      run:
        working-directory: vex-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Install root dependencies (monorepo — same reason as the build-and-test job)
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Install vex-app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (e2e needs the bundled main + preload + renderer)
        run: pnpm run build

      - name: Install Playwright system libraries
        # Electron-only test — we drive the built bundle via
        # `_electron.launch`, not a chromium binary. `install-deps`
        # (vs the more common `install --with-deps chromium`) pulls
        # just the system libs Playwright's runtime needs, without
        # downloading a browser binary we never use.
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright smoke (xvfb)
        # xvfb provides the X server Electron needs on headless
        # Linux. `-a` picks a free display server number.
        run: xvfb-run -a pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: vex-app/playwright-report/
          retention-days: 7
