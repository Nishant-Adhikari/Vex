name: CI

on:
  push:
    branches: [main, stage, production]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  vex-app-build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vex-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Install vex-app dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and typecheck
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
