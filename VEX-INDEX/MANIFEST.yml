    stale_when_paths_change: [<globs>]
    related: [<ids>]
    ---
    # <Title>
    ## Purpose
    ## Retrieval keywords
    ## State owned
    ## Boundary crossings
    ## File map
    ## Key types & invariants
    ## Capabilities (stable IDs)
    ## Public API (consumed by)
    ## Internal flow
    ## Dependencies
    ## Cross-references
    ## Refresh triggers
    ## Open questions

  flow: |
    ---
    id: FLOW-<name>
    kind: flow
    paths: [<globs>]
    source_commit: <abbrev>
    indexed_at: YYYY-MM-DD
    stale_when_paths_change: [<globs>]
    related: [<ids>]
    ---
    # FLOW-<name>: <title>
    ## Trigger
    ## Steps
    | # | caller (file:line symbol) | callee | state change | persistence / event | failure mode |
    ## Invariants
    ## Related modules / capabilities
    ## Known failure modes
